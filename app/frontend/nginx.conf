server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service inside Kubernetes.
    # "backend-service" is the K8s Service name for our backend pods.
    # Argo Rollouts manages the backend pods, so during a canary rollout,
    # requests here will naturally hit both stable and canary pods.
    location /api/ {
        proxy_pass http://backend-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Disable buffering for faster responses
        proxy_buffering off;
    }

    # Health check for the frontend itself
    location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
