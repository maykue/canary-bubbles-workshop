# ============================================================
# CI Pipeline — Backend
# ============================================================
# Builds and pushes the backend Docker image to GitHub Container
# Registry (ghcr.io) whenever changes are pushed to the backend
# code or this workflow file.
#
# After the image is pushed, you update the image tag in
# k8s/backend-rollout.yaml and push to main — ArgoCD picks
# up the change and Argo Rollouts begins the canary!
# ============================================================
name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "app/backend/**"
      - ".github/workflows/backend.yaml"
  # Allow manual triggers for workshop convenience
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v2.0.0)"
        required: true
        default: "v1.0.0"
      color:
        description: "Bubble color hex (e.g., #2ecc71)"
        required: true
        default: "#3498db"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/canary-bubbles-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from input or commit
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "color=${{ github.event.inputs.color }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v1.0.0" >> $GITHUB_OUTPUT
            echo "color=#3498db" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            APP_VERSION=${{ steps.version.outputs.tag }}
            APP_COLOR=${{ steps.version.outputs.color }}
